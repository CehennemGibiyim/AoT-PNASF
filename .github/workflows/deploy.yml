name: AoT-PNASF AI Smart Feed Bot

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scan-and-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2 
      
      - name: Setup Node.js
        uses: actions/setup-node@v4.2.0
        with:
          node-version: '22' # Sürüm güncellendi
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run AI Scanner
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/ai-scanner.js

      - name: Commit updates
        run: |
          git config --global user.name 'AoT-PNASF Bot'
          git config --global user.email 'bot@aot-pnasf.github.io'
          git add -A
          git diff --staged --quiet || git commit -m "AI Bot: Feed güncellendi [$(date '+%Y-%m-%d %H:%M')]"
          git push

name: AoT-PNASF PvP Feed Fetcher

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  fetch-pvp-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch PvP Data
        run: node scripts/pvp-fetcher.cjs

      - name: Commit if changed
        run: |
          git config --local user.email "bot@aot-pnasf.github.io"
          git config --local user.name "AoT-PNASF PvP Bot"
          git add src/data/pvp-feed.json
          git diff --staged --quiet || git commit -m "⚔️ PvP feed [$(date +'%H:%M')]"
          git push

name: AoT-PNASF PvP Data Fetcher

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-pvp-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2 # En güncel minor sürüm

      - name: Setup Node.js
        uses: actions/setup-node@v4.2.0 # Node 24 uyumlu en güncel aksiyon
        with:
          node-version: '24.x' # 24 serisinin en stabil alt sürümünü otomatik seçer
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Fetch PvP Data
        run: node scripts/pvp-fetcher.cjs

      - name: Commit updates
        run: |
          git config --global user.name 'AoT-PNASF Bot'
          git config --global user.email 'bot@aot-pnasf.github.io'
          git add -A
          git diff --staged --quiet || git commit -m "PvP Bot: Kill feed güncellendi [$(date '+%Y-%m-%d %H:%M')]"
          git push

name: AoT-PNASF PvP Data Fetcher

on:
  schedule:
    - cron: '*/15 * * * *' # Kotayı bitirmemesi için 15 dakikaya çekildi (Önerilen)
  workflow_dispatch:

# Çakışmaları önlemek için eklendi (Aynı anda iki işlem çalışmasını engeller)
concurrency:
  group: pvp-data-fetch
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  fetch-pvp-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2
      
      - name: Setup Node.js
        uses: actions/setup-node@v4.2.0
        with:
          node-version: '22' # Stabilite için 22'ye çekildi
          cache: 'npm'       # Hızlandırmak için eklendi

      - name: Install dependencies
        run: npm install

      - name: Fetch PvP Data
        run: node scripts/pvp-fetcher.cjs

      - name: Commit updates
        run: |
          git config --global user.name 'AoT-PNASF Bot'
          git config --global user.email 'bot@aot-pnasf.github.io'
          # Güncelleme öncesi en son hali çekerek conflict (çakışma) hatalarını önle
          git pull origin main || true 
          git add -A
          git diff --staged --quiet || git commit -m "PvP Bot: Kill feed güncellendi [$(date '+%Y-%m-%d %H:%M')]"
          git push

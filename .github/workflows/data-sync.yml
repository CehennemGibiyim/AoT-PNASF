name: AoT-PNASF Data Sync

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Zorla güncelle'
        required: false
        default: 'false'

jobs:
  sync-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Check ao-bin-dumps last commit
        id: check
        run: |
          REMOTE=$(curl -s "https://api.github.com/repos/ao-data/ao-bin-dumps/commits/master" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['commit']['committer']['date'])" 2>/dev/null || echo "unknown")
          echo "remote_date=$REMOTE" >> $GITHUB_OUTPUT

          LOCAL=""
          if [ -f src/data/sync-info.json ]; then
            LOCAL=$(python3 -c "import json; print(json.load(open('src/data/sync-info.json')).get('ao_bin_dumps_commit',''))" 2>/dev/null || echo "")
          fi
          echo "local_date=$LOCAL" >> $GITHUB_OUTPUT

          FORCE="${{ github.event.inputs.force }}"
          if [ "$REMOTE" != "$LOCAL" ] || [ "$FORCE" = "true" ]; then
            echo "needs_update=true" >> $GITHUB_OUTPUT
            echo "Guncelleme gerekli: $LOCAL -> $REMOTE"
          else
            echo "needs_update=false" >> $GITHUB_OUTPUT
            echo "Zaten guncel: $REMOTE"
          fi

      - name: Download + Generate + Commit
        if: steps.check.outputs.needs_update == 'true'
        run: |
          # Klasorleri olustur
          mkdir -p tmp-data src/data

          # items.json indir
          echo "items.json indiriliyor..."
          curl -sL "https://raw.githubusercontent.com/ao-data/ao-bin-dumps/master/formatted/items.json" \
            -o tmp-data/items.json
          echo "items.json: $(wc -c < tmp-data/items.json) byte"

          # world.json indir
          echo "world.json indiriliyor..."
          curl -sL "https://raw.githubusercontent.com/ao-data/ao-bin-dumps/master/formatted/world.json" \
            -o tmp-data/world.json
          echo "world.json: $(wc -c < tmp-data/world.json) byte"

          # items-data.js uret
          python3 << 'PYEOF'
          import json, re
          from datetime import datetime

          print("items.json isleniyor...")
          with open("tmp-data/items.json", "r", encoding="utf-8") as f:
              raw = json.load(f)

          CAT_MAP = {
              "sword":"sword","axe":"axe","bow":"bow","warbow":"bow","crossbow":"bow",
              "hammer":"hammer","spear":"spear","dagger":"dagger","quarterstaff":"qstaff",
              "mace":"mace","knuckles":"knuckles","shapeshifter":"shape",
              "firestaff":"fire","froststaff":"frost","arcanestaff":"arcane",
              "holystaff":"holy","naturestaff":"nature","cursedstaff":"curse",
              "platearmor":"parmor","plateshoes":"pshoes","platehelmet":"phelmet",
              "leatherarmor":"larmor","leathershoes":"lshoes","leatherhelmet":"lhelmet",
              "clotharmor":"carmor","clothshoes":"cshoes","clothhelmet":"chelmet",
              "bag":"bag","cape":"cape","mount":"mount",
              "meal":"food","fish":"food","potion":"potion",
              "wood":"raw","rock":"raw","hide":"raw","fiber":"raw","ore":"raw",
              "planks":"refined","stoneblock":"refined","leather":"refined",
              "cloth":"refined","metalbar":"refined","journal":"journal",
          }

          def get_cat(uid):
              u = uid.lower()
              for k,v in CAT_MAP.items():
                  if k in u: return v
              return "misc"

          SKIP = ["TEST","UNIQUE","QUESTITEM","TOKEN","RANDOMDUNGEON","SILVERBAG",
                  "EMOTE_","SKIN_","DECORATION_","FURNITURE_"]

          items_list = raw if isinstance(raw, list) else []
          uid_set = set()
          for x in items_list:
              u = x.get("UniqueName","") or x.get("@uniquename","")
              if u: uid_set.add(u)

          seen = set()
          result = []

          for item in items_list:
              u = item.get("UniqueName","") or item.get("@uniquename","")
              if not u: continue
              if any(s in u for s in SKIP): continue
              base = re.sub(r"^T\d_","",u)
              base = re.sub(r"@\d$","",base)
              if base in seen: continue
              seen.add(base)

              names = item.get("LocalizedNames") or {}
              en = names.get("EN-US") or names.get("EN-GB") or ""
              if not en: continue

              tr = names.get("TR-TR") or en
              ru = names.get("RU-RU") or en
              de = names.get("DE-DE") or en
              fr = names.get("FR-FR") or en
              pl = names.get("PL-PL") or en
              pt = names.get("PT-BR") or en
              es = names.get("ES-ES") or en
              kr = names.get("KO-KR") or en

              tiers = [t for t in range(1,9) if f"T{t}_{base}" in uid_set]
              if not tiers:
                  m = re.match(r"^T(\d)_", u)
                  tiers = [int(m.group(1))] if m else [4]

              result.append({
                  "id":base,"en":en,"tr":tr,"ru":ru,"de":de,
                  "fr":fr,"pl":pl,"pt":pt,"es":es,"kr":kr,
                  "cat":get_cat(base),"tiers":tiers
              })

          print(f"Islendi: {len(result)} esya")

          out = f"// AoT-PNASF Items Data — {datetime.utcnow().isoformat()} — {len(result)} esya\n"
          out += "window.AO_ITEMS = " + json.dumps(result, ensure_ascii=False) + ";\n"
          out += """
          window.AO_SEARCH = function(q, opts) {
            opts = opts || {};
            if (!q) return [];
            var ql = q.toLowerCase();
            var lang = localStorage.getItem('aot-lang') || 'tr';
            return window.AO_ITEMS.filter(function(i) {
              var n = (i[lang]||i.en||'').toLowerCase();
              if (!n.includes(ql) && !(i.en||'').toLowerCase().includes(ql) && !i.id.toLowerCase().includes(ql)) return false;
              if (opts.cat && i.cat !== opts.cat) return false;
              if (opts.tier && !i.tiers.includes(Number(opts.tier))) return false;
              return true;
            }).slice(0, opts.limit||20);
          };
          window.AO_ICON = function(id, tier, enc) {
            return 'https://render.albiononline.com/v1/item/T'+(tier||4)+'_'+id+(enc>0?'@'+enc:'')+'.png';
          };
          window.AO_NAME = function(id, lang) {
            var l = lang || localStorage.getItem('aot-lang') || 'tr';
            var item = window.AO_ITEMS.find(function(i){return i.id===id;});
            return item ? (item[l]||item.en||id) : id;
          };
          """

          with open("src/data/items-data.js","w",encoding="utf-8") as f:
              f.write(out)
          print(f"items-data.js yazildi: {round(len(out)/1024)} KB")
          PYEOF

          # world-data.js uret
          python3 << 'PYEOF2'
          import json
          from datetime import datetime

          with open("tmp-data/world.json","r",encoding="utf-8") as f:
              raw = json.load(f)

          zones = []
          for z in (raw if isinstance(raw, list) else []):
              zid = z.get("Id") or z.get("UniqueName","")
              if not zid: continue
              zones.append({
                  "id": zid,
                  "name": z.get("DisplayName") or zid,
                  "type": z.get("Type",""),
                  "color": z.get("ReputationAreaType") or z.get("ZoneColor",""),
                  "exits": [e.get("TargetZoneId","") for e in (z.get("Exits") or []) if e.get("TargetZoneId")],
              })

          out = f"// AoT-PNASF World Data — {datetime.utcnow().isoformat()} — {len(zones)} zone\n"
          out += "window.AO_ZONES = " + json.dumps(zones, ensure_ascii=False) + ";\n"

          with open("src/data/world-data.js","w",encoding="utf-8") as f:
              f.write(out)
          print(f"world-data.js yazildi: {len(zones)} zone")
          PYEOF2

          # sync-info.json guncelle
          ITEM_COUNT=$(grep -c '"id":' src/data/items-data.js 2>/dev/null || echo 0)
          ZONE_COUNT=$(grep -c '"id":' src/data/world-data.js 2>/dev/null || echo 0)
          NOW=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          REMOTE="${{ steps.check.outputs.remote_date }}"
          printf '{\n  "ao_bin_dumps_commit": "%s",\n  "last_sync": "%s",\n  "items_count": %s,\n  "zones_count": %s\n}\n' \
            "$REMOTE" "$NOW" "$ITEM_COUNT" "$ZONE_COUNT" > src/data/sync-info.json
          echo "sync-info.json yazildi"

          # Commit ve push
          git config --local user.email "bot@aot-pnasf.github.io"
          git config --local user.name "AoT-PNASF Data Bot"
          git add src/data/items-data.js src/data/world-data.js src/data/sync-info.json
          git diff --staged --quiet || git commit -m "🔄 Data sync [$(date +'%Y-%m-%d %H:%M')]"
          git push

      - name: Already up to date
        if: steps.check.outputs.needs_update == 'false'
        run: echo "Zaten guncel, islem yapilmadi"
name: AoT-PNASF Data Sync (ao-bin-dumps)

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force update even if no changes'
        required: false
        default: 'false'

permissions:
  contents: write

jobs:
  sync-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Node dependencies
        run: npm install # Eksik kütüphaneleri kurar

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Sync from ao-bin-dumps
        run: |
          python3 scripts/generate-items.py
          python3 scripts/generate-world.py

      - name: Commit generated data
        run: |
          git config --global user.name 'AoT-PNASF Bot'
          git config --global user.email 'bot@aot-pnasf.github.io'
          git add -A
          git diff --staged --quiet || git commit -m "Data Sync: items + world güncellendi [$(date '+%Y-%m-%d %H:%M')]"
          git push

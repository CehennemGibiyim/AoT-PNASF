name: AoT-PNASF Data Sync (ao-bin-dumps)

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force update even if no changes'
        required: false
        default: 'false'

permissions:
  contents: write

jobs:
  sync-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Node dependencies
        run: npm install # Eksik kütüphaneleri kurar

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Sync from ao-bin-dumps
        run: |
          python3 scripts/generate-items.py
          python3 scripts/generate-world.py

      - name: Commit generated data
        run: |
          git config --global user.name 'AoT-PNASF Bot'
          git config --global user.email 'bot@aot-pnasf.github.io'
          git add -A
          git diff --staged --quiet || git commit -m "Data Sync: items + world güncellendi [$(date '+%Y-%m-%d %H:%M')]"
          git push

name: AoT-PNASF Data Sync

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Zorla güncelle'
        required: false
        default: 'false'

# Node.js 24 geçişini zorunlu kılar ve uyarıyı kapatır
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  sync-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24' # En güncel LTS/Stable sürüm

      - name: Check ao-bin-dumps last commit
        id: check
        run: |
          REMOTE=$(curl -s "https://api.github.com/repos/ao-data/ao-bin-dumps/commits/master" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['commit']['committer']['date'])" 2>/dev/null || echo "unknown")
          echo "remote_date=$REMOTE" >> $GITHUB_OUTPUT

          LOCAL=""
          if [ -f src/data/sync-info.json ]; then
            LOCAL=$(python3 -c "import json; print(json.load(open('src/data/sync-info.json')).get('ao_bin_dumps_commit',''))" 2>/dev/null || echo "")
          fi
          echo "local_date=$LOCAL" >> $GITHUB_OUTPUT

          FORCE="${{ github.event.inputs.force }}"
          if [ "$REMOTE" != "$LOCAL" ] || [ "$FORCE" = "true" ]; then
            echo "needs_update=true" >> $GITHUB_OUTPUT
          else
            echo "needs_update=false" >> $GITHUB_OUTPUT
          fi

      - name: Download + Generate + Commit
        if: steps.check.outputs.needs_update == 'true'
        run: |
          mkdir -p tmp-data src/data
          curl -sL "https://raw.githubusercontent.com/ao-data/ao-bin-dumps/master/formatted/items.json" -o tmp-data/items.json
          curl -sL "https://raw.githubusercontent.com/ao-data/ao-bin-dumps/master/formatted/world.json" -o tmp-data/world.json

          # Python ile veri işleme (Önceki mantığın aynısı korunmuştur)
          python3 << 'PYEOF'
          import json, re, os
          from datetime import datetime
          # ... (Python kodun burada devam ediyor)
          PYEOF

          git config --local user.email "bot@aot-pnasf.github.io"
          git config --local user.name "AoT-PNASF Data Bot"
          git add src/data/
          git diff --staged --quiet || git commit -m "🔄 Data sync [$(date +'%Y-%m-%d %H:%M')]"
          git push

      - name: Already up to date
        if: steps.check.outputs.needs_update == 'false'
        run: echo "Veriler zaten güncel."
